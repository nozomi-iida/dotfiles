# herdr 設定ファイル(tmux.confと同じ操作感に合わせている)
# デフォルト全体は `herdr --default-config` で確認できる。

[terminal]
new_cwd = "follow"

[keys]
prefix = "ctrl+t"
split_horizontal = "prefix+double_quote"
split_vertical = "prefix+percent"
reload_config = "prefix+r"
resize_mode = "prefix+shift+r"

[ui]
pane_gaps = false

show_agent_labels_on_pane_borders = false
[ui.toast]
delivery = "system"

[theme]
name = "catppuccin"
auto_switch = false

[experimental]
pane_history = true
